<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ESP32 Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .box {
      margin: 20px;
      padding: 15px;
      background: #222;
      border-radius: 10px;
    }

    img {
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
    }

    h1 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>ESP32 Live Dashboard</h1>

<div class="box">
  <h2>Temperature</h2>
  <div id="temp">Loading...</div>
</div>

<div class="box">
  <h2>Humidity</h2>
  <div id="hum">Loading...</div>
</div>

<div class="box">
  <h2>Pressure</h2>
  <div id="press">Loading...</div>
</div>

<div class="box">
  <h2>Camera</h2>
  <img id="cam">
</div>

<script>

const user = "bobbyh73";

// -------------------------
// 📊 ADAFRUIT IO LOADER (FORMATTED)
// -------------------------
function loadFeed(feed, elementId, decimals = null) {
  fetch(`https://io.adafruit.com/api/v2/${user}/feeds/${feed}`)
    .then(r => r.json())
    .then(d => {

      let value = d?.last_value ?? d?.value ?? "No data";

      // format numbers
      if (value !== "No data" && !isNaN(value)) {
        if (decimals !== null) {
          value = parseFloat(value).toFixed(decimals);
        }
      }

      document.getElementById(elementId).innerText = value;
    })
    .catch(() => {
      document.getElementById(elementId).innerText = "Error";
    });
}

// update sensors
function updateSensors() {
  loadFeed("temperature", "temp", 1); // 1 decimal
  loadFeed("humidity", "hum", 1);      // 1 decimal
  loadFeed("pressure", "press", 2);    // 2 decimals
}

// -------------------------
// 📸 CAMERA (DROPBOX)
// -------------------------
const dropboxImage =
"https://www.dropbox.com/scl/fi/0yn95qw6p854gza58jgvi/esp32_vga.jpg?raw=1";

function loadImage() {
  const img = document.getElementById("cam");

  img.src = "";
  setTimeout(() => {
    img.src = dropboxImage + "&t=" + Date.now();
  }, 100);
}

// -------------------------
// 🚀 START
// -------------------------
updateSensors();
loadImage();

// refresh every 3 minutes
setInterval(() => {
  updateSensors();
  loadImage();
}, 180000);

</script>

</body>
</html>
