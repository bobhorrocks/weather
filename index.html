<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ESP32 Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .box {
      margin: 20px;
      padding: 15px;
      background: #222;
      border-radius: 10px;
    }

    img {
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
    }

    h1 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>ESP32 Live Dashboard</h1>

<div class="box">
  <h2>Temperature</h2>
  <div id="temp">Loading...</div>
</div>

<div class="box">
  <h2>Humidity</h2>
  <div id="hum">Loading...</div>
</div>

<div class="box">
  <h2>Pressure</h2>
  <div id="press">Loading...</div>
</div>

<div class="box">
  <h2>Camera (Dropbox)</h2>
  <img id="cam">
</div>

<script>

const user = "bobbyh73";

// -------------------------
// 📊 ADAFRUIT IO SAFE LOADER
// -------------------------
function loadFeed(feed, elementId) {
  fetch(`https://io.adafruit.com/api/v2/${user}/feeds/${feed}`)
    .then(r => r.json())
    .then(d => {
      const value =
        (d && d.last_value !== undefined) ? d.last_value :
        (d && d.value !== undefined) ? d.value :
        "No data";

      document.getElementById(elementId).innerText = value;
    })
    .catch(err => {
      document.getElementById(elementId).innerText = "Error";
      console.log(feed, err);
    });
}

// update all sensors
function updateSensors() {
  loadFeed("temperature", "temp");
  loadFeed("humidity", "hum");
  loadFeed("pressure", "press");
}

// -------------------------
// 📸 DROPBOX IMAGE (FIXED)
// -------------------------

const dropboxImage =
"https://www.dropbox.com/scl/fi/0yn95qw6p854gza58jgvi/esp32_vga.jpg?raw=1";

function loadImage() {
  document.getElementById("cam").src =
    dropboxImage + "&cache=" + Date.now();
}

// -------------------------
// 🚀 START
// -------------------------

updateSensors();
loadImage();

// refresh every 3 minutes
setInterval(() => {
  updateSensors();
  loadImage();
}, 180000);

</script>

</body>
</html>
