<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ESP32 Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .box {
      margin: 20px;
      padding: 15px;
      background: #222;
      border-radius: 10px;
    }

    img {
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>ESP32 Live Dashboard</h1>

<div class="box">
  <h2>Temperature</h2>
  <div id="temp">Loading...</div>
</div>

<div class="box">
  <h2>Humidity</h2>
  <div id="hum">Loading...</div>
</div>

<div class="box">
  <h2>Pressure</h2>
  <div id="press">Loading...</div>
</div>

<div class="box">
  <h2>Camera (Dropbox)</h2>
  <img id="cam">
</div>

<script>

const user = "bobbyh73";

// -------------------------
// 📊 ADAFRUIT IO FEEDS
// -------------------------
function loadFeed(feed, elementId) {
  fetch(`https://io.adafruit.com/api/v2/${user}/feeds/${feed}`)
    .then(r => r.json())
    .then(d => {
      const value =
        d?.last_value ?? d?.value ?? "No data";

      document.getElementById(elementId).innerText = value;
    })
    .catch(() => {
      document.getElementById(elementId).innerText = "Error";
    });
}

function updateSensors() {
  loadFeed("temperature", "temp");
  loadFeed("humidity", "hum");
  loadFeed("pressure", "press");
}

// -------------------------
// 📸 DROPBOX IMAGE (STABLE)
// -------------------------
const dropboxImage =
"https://www.dropbox.com/scl/fi/0yn95qw6p854gza58jgvi/esp32_vga.jpg?rlkey=wp3axq2rzh9fauccz838jc94e&raw=1";

function loadImage() {
  const img = document.getElementById("cam");

  // force clean reload (prevents caching issues)
  img.src = "";
  setTimeout(() => {
    img.src = dropboxImage + "&t=" + Date.now();
  }, 100);
}

// -------------------------
// 🚀 START
// -------------------------
updateSensors();
loadImage();

// ⏱ refresh every 3 minutes (matches ESP32 cycle)
setInterval(() => {
  updateSensors();
  loadImage();
}, 180000);

</script>

</body>
</html>
